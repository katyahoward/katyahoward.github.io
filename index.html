<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katya Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Playfair Display', serif;
}

/* Texture overlay */
.texture {
    position: absolute;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/noise.png");
    opacity: 0.15;
    pointer-events: none;
}

/* Folder base */
.folder {
    position: relative;
    border-radius: 12px;
    padding: 80px 40px 40px;
    transition: all 0.4s ease;
    cursor: pointer;
}

/* Hover */
.folder:hover {
    transform: translateY(-15px);
}

/* Stack overlap */
.stack > div:not(:first-child) {
    margin-top: -80px;
}

/* Tabs */
.tab {
    position: absolute;
    top: -25px;
    width: 140px;
    height: 40px;
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
}

/* Paperclip */
.paperclip {
    position: absolute;
    left: -10px;
    top: 25px;
    transform: rotate(5deg);
}

/* Textures */
.paint {
    background: linear-gradient(145deg,#0047AB,#002f7a);
}

.linen {
    background: repeating-linear-gradient(
        45deg,
        #E0FFFF,
        #E0FFFF 2px,
        #d0f0f0 2px,
        #d0f0f0 4px
    );
}

.crumple {
    background: repeating-linear-gradient(
        0deg,
        #002366,
        #002366 10px,
        #001a4d 10px,
        #001a4d 12px
    );
}

.stripes {
    background: repeating-linear-gradient(
        90deg,
        #00BFFF,
        #00BFFF 20px,
        white 20px,
        white 40px
    );
}
</style>
</head>

<body class="bg-[#E0FFFF] min-h-screen relative overflow-hidden">

<div class="texture"></div>

<!-- HEADING (FIXED TOP LEFT) -->
<h1 class="absolute top-12 left-12 text-6xl uppercase tracking-tight leading-[0.9] text-[#00008B] z-50">
KATYA HOWARD'S PORTFOLIO
</h1>

<!-- LOGO -->
<div class="absolute top-12 right-12 text-2xl text-[#00008B] z-50">
CVA
</div>

<!-- STACK -->
<div class="stack max-w-3xl mx-auto mt-72 relative">

<!-- Folder 1 -->
<div onclick="openPage('about.html')" class="folder paint text-white shadow-2xl z-10">
    <div class="tab bg-blue-800 left-[10%] text-[#F0FFFF] z-50">ABOUT ME</div>
    <span class="paperclip">📎</span>
</div>

<!-- Folder 2 -->
<div onclick="openPage('projects.html')" class="folder linen shadow-2xl z-20">
    <div class="tab bg-cyan-300 left-[40%] text-[#00008B] z-50">PROJECTS</div>
    <span class="paperclip">📎</span>
</div>

<!-- Folder 3 -->
<div onclick="openPage('skills.html')" class="folder crumple shadow-2xl z-30">
    <div class="tab bg-blue-900 left-[20%] text-[#F0FFFF] z-50">SKILLS</div>
    <span class="paperclip">📎</span>
</div>

<!-- Folder 4 -->
<div onclick="openPage('experience.html')" class="folder stripes shadow-2xl z-40">
    <div class="tab bg-sky-400 left-[55%] text-[#00008B] z-50">EXPERIENCE</div>
    <span class="paperclip">📎</span>
</div>

</div>

<script>
function openPage(page) {
    document.querySelectorAll('.folder').forEach(f => {
        f.style.opacity = "0";
    });

    setTimeout(() => {
        window.location.href = page;
    }, 500);
}
</script>

</body>
</html>
