<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katya Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Playfair Display', serif;
}

/* Grain texture */
.texture {
    position: absolute;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/noise.png");
    opacity: 0.15;
    pointer-events: none;
}

/* Folder base */
.folder {
    position: relative;
    border-radius: 12px;
    padding: 40px;
    transition: all 0.4s ease;
    cursor: pointer;
}

.folder:hover {
    transform: translateY(-15px);
}

/* Paperclip */
.paperclip {
    position: absolute;
    left: -10px;
    top: 20px;
    transform: rotate(5deg);
    font-size: 24px;
}

/* Overlap */
.stack > div:not(:first-child) {
    margin-top: -60px;
}

/* Tabs */
.tab {
    position: absolute;
    top: -20px;
    width: 120px;
    height: 30px;
    border-radius: 12px 12px 0 0;
}

/* Textures */
.paint {
    background: linear-gradient(145deg,#0047AB,#002f7a);
}

.linen {
    background: repeating-linear-gradient(
        45deg,
        #E0FFFF,
        #E0FFFF 2px,
        #d0f0f0 2px,
        #d0f0f0 4px
    );
}

.crumple {
    background: repeating-linear-gradient(
        0deg,
        #002366,
        #002366 10px,
        #001a4d 10px,
        #001a4d 12px
    );
}

.stripes {
    background: repeating-linear-gradient(
        90deg,
        #00BFFF,
        #00BFFF 20px,
        white 20px,
        white 40px
    );
}
</style>

</head>

<body class="bg-[#E0FFFF] min-h-screen relative overflow-hidden">

<div class="texture"></div>

<!-- HEADER -->
<h1 class="absolute top-16 left-12 text-6xl uppercase tracking-tight leading-[0.9] text-[#00008B]">
HOW TO CREATE YOUR NEXT BEST CAMPAIGN
</h1>

<div class="absolute top-8 right-12 text-2xl text-[#00008B]">
CVA
</div>

<!-- STACK -->
<div class="stack max-w-3xl mx-auto mt-64 space-y-0">

<!-- Folder 1 -->
<div onclick="openPage('about.html')" class="folder paint text-white shadow-2xl z-10">
    <div class="tab bg-blue-700 left-[10%]"></div>
    <span class="paperclip">📎</span>
    ABOUT ME
</div>

<!-- Folder 2 -->
<div onclick="openPage('projects.html')" class="folder linen text-white shadow-2xl z-20">
    <div class="tab bg-cyan-300 left-[40%]"></div>
    <span class="paperclip">📎</span>
    PROJECTS
</div>

<!-- Folder 3 -->
<div onclick="openPage('skills.html')" class="folder crumple text-[#00008B] shadow-2xl z-30">
    <div class="tab bg-blue-900 left-[20%]"></div>
    <span class="paperclip">📎</span>
    SKILLS
</div>

<!-- Folder 4 -->
<div onclick="openPage('experience.html')" class="folder stripes text-[#00008B] shadow-2xl z-40">
    <div class="tab bg-sky-400 left-[55%]"></div>
    <span class="paperclip">📎</span>
    EXPERIENCE
</div>

</div>

<script>
function openPage(page) {
    document.querySelectorAll('.folder').forEach(f => {
        f.style.opacity = "0";
    });

    setTimeout(() => {
        window.location.href = page;
    }, 500);
}
</script>

</body>
</html>
